<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>落語会 エントリー受付</title>
    <!-- 和風・力強いフォントの読み込み -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Noto+Serif+JP:wght@600;900&display=swap" rel="stylesheet">
    
    <style>
        /* 全体の和風スタイル */
        body {
            font-family: 'Noto Serif JP', serif;
            background-color: #f4efe2; /* 鳥の子色（落ち着いた和紙のようなクリーム色） */
            color: #222;
            margin: 0;
            padding: 20px;
            background-image: radial-gradient(#e0d7c1 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
            background: #ffffff;
            border: 5px double #5c1e1a; /* 漆塗りのような深い赤の2重線 */
            border-radius: 4px;
            padding: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* 寄席の看板風ヘッダー */
        header {
            text-align: center;
            background-color: #111; /* 黒の定式幕背景 */
            color: #fff;
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 30px;
            border-bottom: 8px solid #e15f00; /* 柿色 */
            position: relative;
        }
        header::after {
            content: "";
            position: absolute;
            bottom: -16px;
            left: 0;
            width: 100%;
            height: 8px;
            background-color: #2b4f19; /* 萌黄色 */
        }

        h1 {
            font-family: 'Dela Gothic One', sans-serif; /* 寄席文字を意識した太いフォント */
            margin: 0;
            font-size: 2rem;
            letter-spacing: 2px;
            color: #f1c40f; /* 金色風の黄色 */
            text-shadow: 2px 2px 0px #c0392b;
        }

        p.subtitle {
            margin: 10px 0 0 0;
            font-size: 0.9rem;
            color: #ddd;
        }

        /* フォーム要素 */
        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: 900;
            margin-bottom: 8px;
            color: #5c1e1a;
            border-left: 4px solid #e15f00;
            padding-left: 8px;
            font-size: 1.1rem;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
            font-family: 'Noto Serif JP', serif;
            background-color: #faf8f5;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            border-color: #e15f00;
            outline: none;
            background-color: #fff;
        }

        /* 所属と学年の横並びレイアウト用 */
        .row-group {
            display: flex;
            gap: 15px;
        }
        .row-group .form-group {
            flex: 1;
        }
        @media (max-width: 480px) {
            .row-group {
                flex-direction: column;
                gap: 0;
            }
        }

        /* ラジオボタンの和風カスタム */
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            border: none;
            padding: 0;
            cursor: pointer;
            font-weight: normal;
            color: #222;
        }

        .radio-label input {
            margin-right: 6px;
            accent-color: #e15f00; /* 柿色 */
        }

        /* 動的表示エリアのアニメーション用 */
        .conditional-section {
            display: none;
            background-color: #f9f5eb;
            padding: 15px;
            border-left: 3px solid #2b4f19; /* 萌黄色 */
            margin-top: 15px;
            border-radius: 0 4px 4px 0;
        }

        /* 出囃子用の入力レイアウト */
        .debashi-wrap {
            display: flex;
            gap: 10px;
        }
        
        /* 木札風の「なし」ボタン */
        .none-btn {
            background: #e0d7c1;
            border: 2px solid #aaa;
            border-bottom: 4px solid #888;
            padding: 0 20px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            font-family: 'Noto Serif JP', serif;
            transition: all 0.1s;
        }
        .none-btn:active {
            border-bottom-width: 2px;
            transform: translateY(2px);
        }

        /* 寄席のビラ風・送信ボタン */
        .submit-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #5c1e1a; /* 深い赤 */
            color: white;
            border: none;
            border-bottom: 5px solid #3a1310;
            border-radius: 4px;
            font-size: 1.3rem;
            font-family: 'Dela Gothic One', sans-serif;
            cursor: pointer;
            box-sizing: border-box;
            letter-spacing: 4px;
            transition: all 0.1s;
            margin-top: 30px;
        }

        .submit-btn:hover {
            background-color: #722621;
        }

        .submit-btn:active {
            border-bottom-width: 1px;
            transform: translateY(4px);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>落語会 出演申込</h1>
        <p class="subtitle">必要事項をご入力の上、「登録する」とお進みください。</p>
    </header>

    <form id="entryForm" onsubmit="handleSubmit(event)">
        
        <!-- 高座名 -->
        <div class="form-group">
            <label for="kouzaName">高座名（こうざめい）</label>
            <input type="text" id="kouzaName" required placeholder="例：与太郎">
        </div>

        <!-- 所属団体・学年（横並び配置、スマホ時は縦に自動調整） -->
        <div class="row-group">
            <div class="form-group">
                <label for="affiliation">所属団体</label>
                <input type="text" id="affiliation" required placeholder="例：〇〇大学落語研究会、〇〇倶楽部">
            </div>
            <div class="form-group">
                <label for="grade">学年・年代</label>
                <input type="text" id="grade" required placeholder="例：大3、OB、社会人">
            </div>
        </div>

        <!-- 演目名 -->
        <div class="form-group">
            <label for="enmokuName">演目名（えんもくめい）</label>
            <input type="text" id="enmokuName" required placeholder="例：時そば">
        </div>

        <!-- 分数 -->
        <div class="form-group">
            <label for="duration">所要分数（分）</label>
            <input type="number" id="duration" required min="1" max="120" placeholder="例：15">
        </div>

        <!-- ジャンル（落語 or 講談） -->
        <div class="form-group">
            <label>種別</label>
            <div class="radio-group">
                <label class="radio-label"><input type="radio" name="genre" value="落語" required onclick="toggleGenre()"> 落語</label>
                <label class="radio-label"><input type="radio" name="genre" value="講談" onclick="toggleGenre()"> 講談</label>
            </div>
        </div>

        <!-- 【条件分岐】落語の場合：演目タイプ -->
        <div id="rakugoSection" class="conditional-section">
            <div class="form-group" style="margin-bottom: 0;">
                <label>演目タイプ</label>
                <div class="radio-group">
                    <label class="radio-label"><input type="radio" name="rakugoType" value="江戸" onclick="toggleRakugoType()"> 江戸前（江戸落語）</label>
                    <label class="radio-label"><input type="radio" name="rakugoType" value="上方" onclick="toggleRakugoType()"> 上方（上方落語）</label>
                </div>
            </div>

            <!-- 【条件分岐】上方の場合：見台の有無 -->
            <div id="kamigataSection" class="conditional-section" style="border-left-color: #e15f00; padding-left: 15px; margin-top: 15px;">
                <div class="form-group" style="margin-bottom: 0;">
                    <label>見台（けんだい）の有無</label>
                    <div class="radio-group">
                        <label class="radio-label"><input type="radio" name="kendai" value="あり"> 必要（あり）</label>
                        <label class="radio-label"><input type="radio" name="kendai" value="なし"> 不要（なし）</label>
                    </div>
                </div>
            </div>
        </div>

        <!-- 出囃子希望 -->
        <div class="form-group" style="margin-top: 25px;">
            <label for="debashi">出囃子（でばやし）のご希望</label>
            <div class="debashi-wrap">
                <input type="text" id="debashi" required placeholder="例：一月一日、元禄花見踊 など">
                <button type="button" class="none-btn" onclick="setNoDebashi()">なし</button>
            </div>
        </div>

        <!-- 送信ボタン -->
        <button type="submit" class="submit-btn">登録する</button>
    </form>
</div>

<script>
    // ジャンル（落語・講談）の切り替え制御
    function toggleGenre() {
        const genre = document.querySelector('input[name="genre"]:checked').value;
        const rakugoSection = document.getElementById('rakugoSection');
        const kamigataSection = document.getElementById('kamigataSection');

        if (genre === '落語') {
            rakugoSection.style.display = 'block';
            // 必須設定を有効に
            document.querySelectorAll('input[name="rakugoType"]').forEach(el => el.required = true);
        } else {
            rakugoSection.style.display = 'none';
            kamigataSection.style.display = 'none';
            // 選択と必須設定をクリア
            clearRadioGroup('rakugoType');
            clearRadioGroup('kendai');
        }
    }

    // 落語タイプ（江戸・上方）の切り替え制御
    function toggleRakugoType() {
        const rakugoType = document.querySelector('input[name="rakugoType"]:checked').value;
        const kamigataSection = document.getElementById('kamigataSection');

        if (rakugoType === '上方') {
            kamigataSection.style.display = 'block';
            document.querySelectorAll('input[name="kendai"]').forEach(el => el.required = true);
        } else {
            kamigataSection.style.display = 'none';
            clearRadioGroup('kendai');
        }
    }

    // 「なし」ボタンを押した時の処理
    function setNoDebashi() {
        document.getElementById('debashi').value = 'なし';
    }

    // ラジオボタンのクリア用ヘルパー
    function clearRadioGroup(name) {
        document.querySelectorAll(`input[name="${name}"]`).forEach(el => {
            el.checked = false;
            el.required = false;
        });
    }

    // 送信時のダミー処理
    function handleSubmit(event) {
        event.preventDefault();
        alert('エントリー情報を受け付けました！');
    }
</script>

</body>
</html>
